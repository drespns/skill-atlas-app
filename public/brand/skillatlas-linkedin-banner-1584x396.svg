<?xml version="1.0" encoding="UTF-8"?>
<svg width="1584" height="396" viewBox="0 0 1584 396" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1584" y2="396">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E1B4B"/>
    </linearGradient>

    <linearGradient id="titleGrad" x1="940" y1="152" x2="1660" y2="280">
      <stop stop-color="#C4B5FD"/>
      <stop offset="0.55" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#93C5FD"/>
    </linearGradient>

    <radialGradient id="markGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      transform="translate(804 208) rotate(90) scale(190)">
      <stop stop-color="#A78BFA" stop-opacity="0.32"/>
      <stop offset="0.55" stop-color="#60A5FA" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orbA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      transform="translate(444 143) rotate(90) scale(364)">
      <stop stop-color="#60A5FA" stop-opacity="0.22"/>
      <stop offset="0.45" stop-color="#A78BFA" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orbB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      transform="translate(697 285) rotate(90) scale(309)">
      <stop stop-color="#C4B5FD" stop-opacity="0.16"/>
      <stop offset="0.55" stop-color="#93C5FD" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#93C5FD" stop-opacity="0"/>
    </radialGradient>

    <filter id="softBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" />
    </filter>

    <filter id="titleShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <filter id="lineGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#A78BFA" flood-opacity="0.18"/>
    </filter>

    <pattern id="microGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1"/>
      <circle cx="0" cy="0" r="1.25" fill="#93C5FD" opacity="0.10"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1584" height="396" fill="url(#bg)"/>

  <!-- Depth layers -->
  <rect x="0" y="0" width="1584" height="396" fill="url(#orbA)"/>
  <rect x="0" y="0" width="1584" height="396" fill="url(#orbB)"/>
  <rect x="0" y="0" width="1584" height="396" fill="url(#microGrid)" opacity="0.35"/>

  <!-- Orbits / connections -->
  <g opacity="0.30" filter="url(#lineGlow)">
    <path d="M158 71 C 412 20, 634 32, 887 79" stroke="#93C5FD" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M222 317 C 507 261, 760 238, 1077 206" stroke="#C4B5FD" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M507 40 C 602 103, 729 174, 919 246" stroke="#A78BFA" stroke-width="1.4" stroke-linecap="round" opacity="0.9"/>
    <path d="M697 63 C 887 111, 1077 150, 1331 174" stroke="#60A5FA" stroke-width="1.4" stroke-linecap="round" opacity="0.9"/>
    <path d="M919 24 C 1172 79, 1362 143, 1521 222" stroke="#93C5FD" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
    <path d="M824 356 C 1140 293, 1362 238, 1552 174" stroke="#C4B5FD" stroke-width="2" stroke-linecap="round" opacity="0.75"/>

    <!-- nodes -->
    <circle cx="158" cy="71" r="3.5" fill="#93C5FD" opacity="0.95"/>
    <circle cx="887" cy="79" r="4" fill="#93C5FD"/>
    <circle cx="222" cy="317" r="3.5" fill="#C4B5FD" opacity="0.95"/>
    <circle cx="1077" cy="206" r="4" fill="#C4B5FD"/>
    <circle cx="919" cy="246" r="3.25" fill="#A78BFA" opacity="0.95"/>
    <circle cx="1331" cy="174" r="3.25" fill="#60A5FA" opacity="0.95"/>
    <circle cx="1521" cy="222" r="3.75" fill="#93C5FD" opacity="0.9"/>
    <circle cx="1552" cy="174" r="3.75" fill="#C4B5FD" opacity="0.9"/>
  </g>

  <!-- Mark glow -->
  <circle cx="806" cy="206" r="144" fill="url(#markGlow)" filter="url(#softBlur)"/>

  <!-- Brand mark (favicon) -->
  <image href="data:image/svg+xml;base64," x="694" y="98" width="200" height="200" preserveAspectRatio="xMidYMid meet" />

  <!-- Title -->
  <text x="940" y="216"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
    font-size="86"
    font-weight="800"
    letter-spacing="-1.2"
    fill="url(#titleGrad)"
    filter="url(#titleShadow)"
  >SkillAtlas</text>

  <!-- Slight vignette to add depth -->
  <rect x="0" y="0" width="1584" height="396" fill="black" opacity="0.10"/>
</svg>