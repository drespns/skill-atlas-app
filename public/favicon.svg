<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bgDark" x1="0" y1="0" x2="160" y2="160">
            <stop stop-color="#0F172A" />
            <stop offset="1" stop-color="#1E1B4B" />
        </linearGradient>

        <linearGradient id="accentDark" x1="40" y1="40" x2="120" y2="120">
            <stop stop-color="#C4B5FD" />
            <stop offset="1" stop-color="#93C5FD" />
        </linearGradient>
    </defs>

    <!-- Globe -->
    <circle cx="80" cy="80" r="60" fill="url(#bgDark)" stroke="url(#accentDark)" stroke-width="2" />

    <!-- Lines -->
    <ellipse cx="80" cy="80" rx="45" ry="20" stroke="#A78BFA" stroke-width="1.5" opacity="0.7" />
    <ellipse cx="80" cy="80" rx="45" ry="40" stroke="#60A5FA" stroke-width="1.5" opacity="0.6" />

    <ellipse cx="80" cy="80" rx="20" ry="45" stroke="#A78BFA" stroke-width="1.5" opacity="0.7" />
    <ellipse cx="80" cy="80" rx="40" ry="45" stroke="#60A5FA" stroke-width="1.5" opacity="0.6" />

    <!-- Connections -->
    <path d="M80 40 L40 90 L80 110 L120 95 Z" stroke="url(#accentDark)" stroke-width="1.5" />

    <!-- Nodes -->
    <circle cx="80" cy="40" r="4" fill="#C4B5FD" />
    <circle cx="40" cy="90" r="4" fill="#93C5FD" />
    <circle cx="120" cy="95" r="4" fill="#93C5FD" />
    <circle cx="80" cy="110" r="4" fill="#C4B5FD" />

    <!-- Center -->
    <circle cx="80" cy="80" r="5" fill="url(#accentDark)" />
</svg>