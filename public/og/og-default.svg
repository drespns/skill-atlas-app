<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">SkillAtlas</title>
  <desc id="desc">Mapa de conocimiento técnico y portfolio</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="45%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="120" r="220" fill="#6366f1" opacity="0.12"/>
  <circle cx="180" cy="520" r="280" fill="#38bdf8" opacity="0.08"/>
  <rect x="96" y="420" width="520" height="6" rx="3" fill="url(#accent)" opacity="0.85"/>
  <text x="96" y="280" font-family="system-ui, Segoe UI, sans-serif" font-size="72" font-weight="700" fill="#f8fafc" letter-spacing="-0.02em">SkillAtlas</text>
  <text x="96" y="360" font-family="system-ui, Segoe UI, sans-serif" font-size="34" font-weight="500" fill="#c7d2fe" opacity="0.95">Tu mapa de conocimiento técnico</text>
  <text x="96" y="410" font-family="system-ui, Segoe UI, sans-serif" font-size="24" font-weight="400" fill="#94a3b8" opacity="0.9">Tecnologías · Proyectos · Portfolio · CV</text>
</svg>
